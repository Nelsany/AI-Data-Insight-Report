services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: reviewlens
      POSTGRES_USER: reviewlens
      POSTGRES_PASSWORD: reviewlens
    ports:
      - "5432:5432"
    volumes:
      - reviewlens_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - reviewlens_redis:/data

volumes:
  reviewlens_pg:
  reviewlens_redis:

